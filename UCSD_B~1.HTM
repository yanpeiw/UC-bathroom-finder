<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UC San Diego Bathroom Finder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --blue:#1a73e8;
    --gray-bg:#f8f9fa;
    --border:#e0e0e0;
    --text:#202124;
    --text-light:#5f6368;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);}
  #app{display:flex;height:100vh;width:100vw;}

  /* Sidebar */
  #sidebar{
    width:340px;
    min-width:340px;
    background:#fff;
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    z-index:10;
    box-shadow:2px 0 6px rgba(0,0,0,0.08);
  }
  #sidebar-header{
    padding:14px 16px 10px 16px;
    border-bottom:1px solid var(--border);
  }
  #sidebar-header h1{
    font-size:18px;
    margin:0 0 10px 0;
    display:flex;
    align-items:center;
    gap:8px;
  }
  #sidebar-header h1 .icon{font-size:20px;}
  #search-box{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:24px;
    font-size:14px;
    outline:none;
  }
  #search-box:focus{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue);}
  #region-filter{
    margin-top:8px;
    width:100%;
    padding:8px 10px;
    border:1px solid var(--border);
    border-radius:8px;
    font-size:13px;
    background:#fff;
  }
  #result-count{
    padding:8px 16px;
    font-size:12px;
    color:var(--text-light);
    border-bottom:1px solid var(--border);
  }
  #list{
    flex:1;
    overflow-y:auto;
  }
  .item{
    padding:10px 16px;
    border-bottom:1px solid #f1f1f1;
    cursor:pointer;
    display:flex;
    gap:10px;
    align-items:flex-start;
  }
  .item:hover{background:var(--gray-bg);}
  .item.active{background:#e8f0fe;}
  .item .pin{
    font-size:18px;
    line-height:1;
    margin-top:2px;
  }
  .item .info .name{font-size:13.5px;font-weight:500;}
  .item .info .region{font-size:11.5px;color:var(--text-light);margin-top:2px;}
  #empty{padding:20px 16px;color:var(--text-light);font-size:13px;display:none;}

  /* Map */
  #map{flex:1;height:100%;}

  .leaflet-popup-content{font-size:13px;}
  .leaflet-popup-content b{font-size:14px;}
  .popup-tag{
    display:inline-block;
    margin-top:4px;
    font-size:11px;
    background:#e6f4ea;
    color:#1e8e3e;
    padding:2px 8px;
    border-radius:10px;
  }

  #footer-note{
    padding:8px 16px;
    font-size:11px;
    color:var(--text-light);
    border-top:1px solid var(--border);
    background:var(--gray-bg);
  }
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1><span class="icon">🚻</span> UCSD Bathroom Finder</h1>
      <input id="search-box" type="text" placeholder="Search a building..." />
      <select id="region-filter"></select>
    </div>
    <div id="result-count"></div>
    <div id="list"></div>
    <div id="empty">No restrooms match your search.</div>
    <div id="footer-note">108 single-occupancy / gender-inclusive restrooms, sourced from UC San Diego Facilities Management. Pins are placed at building level (approximate), not exact door location.</div>
  </div>
  <div id="map"></div>
</div>

// ---- Map setup ----
const map = L.map('map', {zoomControl:false}).setView([32.8795,-117.2380], 15);
L.control.zoom({position:'bottomright'}).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

function pinIcon(active){
  return L.divIcon({
    className:'',
    html:`<div style="
      width:30px;height:30px;
      background:${active ? '#ea4335' : '#1a73e8'};
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 5px rgba(0,0,0,0.4);
      border:2px solid #fff;">
      <span style="transform:rotate(45deg);font-size:14px;">🚻</span>
    </div>`,
    iconSize:[30,30],
    iconAnchor:[15,30],
    popupAnchor:[0,-28]
  });
}

const markers = restrooms.map((r,i)=>{
  const [name, region, lat, lng] = r;
  const m = L.marker([lat,lng], {icon:pinIcon(false)}).addTo(map);
  m.bindPopup(`<b>${name}</b><br>${region}<div class="popup-tag">Single-occupancy / gender-inclusive</div>`);
  return m;
});

// ---- Sidebar ----
const listEl = document.getElementById('list');
const searchBox = document.getElementById('search-box');
const regionFilter = document.getElementById('region-filter');
const resultCount = document.getElementById('result-count');
const emptyEl = document.getElementById('empty');

const regions = [...new Set(restrooms.map(r=>r[1]))].sort();
regionFilter.innerHTML = '<option value="">All areas of campus</option>' +
  regions.map(r=>`<option value="${r}">${r}</option>`).join('');

let activeIndex = null;

function render(){
  const q = searchBox.value.trim().toLowerCase();
  const region = regionFilter.value;
  listEl.innerHTML = '';
  let count = 0;

  restrooms.forEach((r,i)=>{
    const [name, reg] = r;
    const matchesQ = !q || name.toLowerCase().includes(q) || reg.toLowerCase().includes(q);
    const matchesRegion = !region || reg === region;
    const visible = matchesQ && matchesRegion;
    markers[i].getElement() && (markers[i].getElement().style.display = visible ? '' : 'none');
    if(!visible) return;
    count++;
    const div = document.createElement('div');
    div.className = 'item' + (i===activeIndex ? ' active' : '');
    div.innerHTML = `<span class="pin">📍</span><div class="info"><div class="name">${name}</div><div class="region">${reg}</div></div>`;
    div.addEventListener('click', ()=>selectItem(i));
    listEl.appendChild(div);
  });

  resultCount.textContent = `${count} restroom${count===1?'':'s'} found`;
  emptyEl.style.display = count===0 ? 'block' : 'none';
}

function selectItem(i){
  if(activeIndex!==null && markers[activeIndex]) markers[activeIndex].setIcon(pinIcon(false));
  activeIndex = i;
  markers[i].setIcon(pinIcon(true));
  map.flyTo(markers[i].getLatLng(), 18, {duration:0.6});
  markers[i].openPopup();
  render();
}

searchBox.addEventListener('input', render);
regionFilter.addEventListener('change', render);

markers.forEach((m,i)=>{
  m.on('click', ()=>selectItem(i));
});

render();
</script>

</html>
